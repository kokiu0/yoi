<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Radar Dodge</title>
<style>
body{
margin:0;
background:black;
color:#0f0;
font-family:monospace;
text-align:center;
overflow:hidden;
}
#warning{
position:absolute;
top:40%;
width:100%;
font-size:30px;
color:red;
}
canvas{
display:none;
}
</style>
</head>

<body>

<div id="warning">⚠ 酔う可能性があります ⚠<br>クリックで開始</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let cx = canvas.width/2
let cy = canvas.height/2

let running=false
let paused=false

let time=0
let score=0
let highScore=0

let angle=0
let rotateSpeed=0.02
let rotateAccel=0.00002

let showCross=true

let player={x:cx,y:cy,r:8}

let enemies=[]
let trail=[]

document.getElementById("warning").onclick=()=>{
document.getElementById("warning").style.display="none"
canvas.style.display="block"
running=true
spawnEnemy()
}

function spawnEnemy(){

let size=(Math.random()*1.5+0.5)*20

let e={
angle:Math.random()*Math.PI*2,
dist:Math.random()*400+200,
r:size
}

enemies.push(e)

setTimeout(spawnEnemy,1200)
}

document.addEventListener("mousemove",e=>{
player.x=e.clientX
player.y=e.clientY
})

document.addEventListener("keydown",e=>{

if(e.key==="p") paused=!paused

if(e.key==="l") showCross=!showCross

})

function update(){

if(paused) return

time+=1/60
score=Math.floor(time)

rotateSpeed+=rotateAccel
angle+=rotateSpeed

trail.push(angle)

if(trail.length>12) trail.shift()

for(let e of enemies){

let ex=cx+Math.cos(e.angle+angle)*e.dist
let ey=cy+Math.sin(e.angle+angle)*e.dist

let dx=player.x-ex
let dy=player.y-ey

let d=Math.sqrt(dx*dx+dy*dy)

if(d<e.r+player.r){

if(score>highScore) highScore=score

resetGame()

}

}

}

function resetGame(){

time=0
score=0
rotateSpeed=0.02
enemies=[]

}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.save()
ctx.translate(cx,cy)
ctx.rotate(angle)

if(showCross){

ctx.strokeStyle="#0f0"
ctx.lineWidth=1

ctx.beginPath()
ctx.moveTo(-1000,0)
ctx.lineTo(1000,0)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,-1000)
ctx.lineTo(0,1000)
ctx.stroke()

}

ctx.restore()

ctx.strokeStyle="#0f0"

for(let a of trail){

ctx.beginPath()
ctx.arc(cx,cy,300,0+a,0.02+a)
ctx.stroke()

}

for(let e of enemies){

let ex=cx+Math.cos(e.angle+angle)*e.dist
let ey=cy+Math.sin(e.angle+angle)*e.dist

ctx.beginPath()
ctx.arc(ex,ey,e.r,0,Math.PI*2)
ctx.stroke()

}

ctx.beginPath()
ctx.arc(player.x,player.y,player.r,0,Math.PI*2)
ctx.fillStyle="#0f0"
ctx.fill()

ctx.fillStyle="#0f0"
ctx.font="20px monospace"

ctx.fillText("Score : "+score,20,40)
ctx.fillText("High : "+highScore,20,70)

if(paused){

ctx.font="40px monospace"
ctx.fillText("PAUSE",cx-80,cy)

}

}

function loop(){

if(running){

update()
draw()

}

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>
