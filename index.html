<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rotate Survival Clean</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: sans-serif;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  border: 4px solid white;
}

#world {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* 中心のうっすら十字 */
#axis {
  position: absolute;
  width: 3px;
  height: 100%;
  background: rgba(255,255,255,0.15);
  left: 50%;
  top: 0;
}

#axis::after {
  content: "";
  position: absolute;
  width: 100vw;
  height: 3px;
  background: rgba(255,255,255,0.15);
  top: 50%;
  left: -50vw;
}

/* プレイヤー（三角） */
.player {
  position: absolute;
  width: 0;
  height: 0;
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 30px solid cyan;
}

/* 敵（オレンジの丸） */
.enemy {
  position: absolute;
  width: 30px;
  height: 30px;
  background: orange;
  border-radius: 50%;
}

#ui {
  position: absolute;
  top: 10px;
  left: 20px;
  font-size: 20px;
}

#gameover {
  position: absolute;
  font-size: 40px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  text-align: center;
}
</style>
</head>
<body>

<div id="game">
  <div id="world">
    <div id="axis"></div>
  </div>
  <div id="ui">Time: 0</div>
  <div id="gameover">GAME OVER<br>Press R to Restart</div>
</div>

<script>
const world = document.getElementById("world");
const ui = document.getElementById("ui");
const gameoverText = document.getElementById("gameover");

let player;
let playerX, playerY;
let enemies = [];
let keys = {};
let gameOver = false;
let startTime;
let slowMode = false;

document.addEventListener("keydown", e => {
  keys[e.key] = true;
  if (e.key === "r") restart();
  if (e.key === "Shift") slowMode = true;
});
document.addEventListener("keyup", e => {
  keys[e.key] = false;
  if (e.key === "Shift") slowMode = false;
});

function createPlayer() {
  player = document.createElement("div");
  player.className = "player";
  world.appendChild(player);
  playerX = window.innerWidth / 2;
  playerY = window.innerHeight / 2;
}

function spawnEnemy() {
  if (gameOver) return;

  const enemy = document.createElement("div");
  enemy.className = "enemy";

  const margin = 50;
  const side = Math.floor(Math.random() * 4);

  if (side === 0) {
    enemy.x = Math.random() * window.innerWidth;
    enemy.y = -margin;
  } else if (side === 1) {
    enemy.x = Math.random() * window.innerWidth;
    enemy.y = window.innerHeight + margin;
  } else if (side === 2) {
    enemy.x = -margin;
    enemy.y = Math.random() * window.innerHeight;
  } else {
    enemy.x = window.innerWidth + margin;
    enemy.y = Math.random() * window.innerHeight;
  }

  const dx = playerX - enemy.x;
  const dy = playerY - enemy.y;
  const len = Math.sqrt(dx*dx + dy*dy);

  enemy.vx = (dx/len) * 2;
  enemy.vy = (dy/len) * 2;

  world.appendChild(enemy);
  enemies.push(enemy);
}

function restart() {
  world.innerHTML = '<div id="axis"></div>';
  enemies = [];
  gameOver = false;
  gameoverText.style.display = "none";
  createPlayer();
  startTime = Date.now();
}

function checkCollision(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx*dx + dy*dy) < 25;
}

function gameLoop() {
  if (!gameOver) {

    let speed = slowMode ? 2 : 5;

    if (keys["ArrowUp"]) playerY -= speed;
    if (keys["ArrowDown"]) playerY += speed;
    if (keys["ArrowLeft"]) playerX -= speed;
    if (keys["ArrowRight"]) playerX += speed;

    const half = 15;
    playerX = Math.max(half, Math.min(window.innerWidth - half, playerX));
    playerY = Math.max(half, Math.min(window.innerHeight - half, playerY));

    player.style.left = playerX + "px";
    player.style.top = playerY + "px";

    enemies.forEach(enemy => {
      enemy.x += enemy.vx;
      enemy.y += enemy.vy;

      enemy.style.left = enemy.x + "px";
      enemy.style.top = enemy.y + "px";

      if (checkCollision({x:playerX,y:playerY}, enemy)) {
        gameOver = true;
        gameoverText.style.display = "block";
      }
    });

    const elapsed = ((Date.now() - startTime)/1000).toFixed(1);
    ui.textContent = "Time: " + elapsed;

    // ゆるやか加速回転
    const elapsedSec = (Date.now() - startTime) / 1000;
    let rotationDuration = 10 - Math.sqrt(elapsedSec) * 0.3;
    if (rotationDuration < 5) rotationDuration = 5;

    const angle = (Date.now() / (rotationDuration * 1000)) * 360 % 360;
    world.style.transform = `rotateZ(${angle}deg)`;
  }

  requestAnimationFrame(gameLoop);
}

setInterval(spawnEnemy, 1000);

restart();
gameLoop();
</script>

</body>
</html>
