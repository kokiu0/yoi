<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rotate Survival Radar</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:sans-serif;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
border:4px solid white;
}

#world{
position:absolute;
width:100%;
height:100%;
}

/* レーダー十字 */

#crossV{
position:absolute;
left:50%;
top:-100vh;
width:2px;
height:300vh;
background:linear-gradient(
transparent,
rgba(0,255,255,0.5),
transparent
);
transform:translateX(-50%);
pointer-events:none;
}

#crossH{
position:absolute;
top:50%;
left:-100vw;
height:2px;
width:300vw;
background:linear-gradient(
90deg,
transparent,
rgba(0,255,255,0.5),
transparent
);
transform:translateY(-50%);
pointer-events:none;
}

/* プレイヤー */

.player{
position:absolute;
width:30px;
height:30px;
background:cyan;
clip-path:polygon(50% 0%,100% 100%,50% 80%,0% 100%);
transform-origin:center;
box-shadow:0 -10px 20px cyan;
}

/* 敵 */

.enemy{
position:absolute;
background:orange;
border-radius:50%;
}

/* 軌跡 */

.trail{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:rgba(0,255,255,0.5);
pointer-events:none;
}

/* UI */

#ui{
position:absolute;
top:10px;
left:20px;
font-size:20px;
}

#gameover{
position:absolute;
font-size:40px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
text-align:center;
}

#warning{
position:absolute;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:30px;
z-index:10;
cursor:pointer;
}

</style>
</head>

<body>

<div id="game">

<div id="world">

<div id="crossV"></div>
<div id="crossH"></div>

</div>

<div id="ui"></div>

<div id="gameover">
GAME OVER<br>
Press R to Restart
</div>

<div id="warning">
⚠ 酔い注意 ⚠<br>
Click to Start
</div>

</div>

<script>

const world=document.getElementById("world")
const ui=document.getElementById("ui")
const gameoverText=document.getElementById("gameover")
const warning=document.getElementById("warning")

let player
let playerX=0
let playerY=0

let enemies=[]
let trails=[]
let keys={}

let gameStarted=false
let gameOver=false
let paused=false

let gameTime=0
let highScore=localStorage.getItem("rotateHighScore")||0

let lastFrame=0
let spawnTimer

warning.onclick=()=>{
warning.style.display="none"
startGame()
}

document.addEventListener("keydown",e=>{
keys[e.key]=true

if(e.key==="r" && gameStarted)
restart()

if(e.key==="p")
paused=!paused
})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

function startGame(){

gameStarted=true
restart()

lastFrame=performance.now()

spawnTimer=setInterval(()=>{

spawnEnemy()

if(gameTime>10) spawnEnemy()
if(gameTime>20) spawnEnemy()
if(gameTime>30) spawnEnemy()
if(gameTime>40) spawnEnemy()
if(gameTime>50) spawnEnemy()
if(gameTime>60) spawnEnemy()
requestAnimationFrame(gameLoop)
}

function restart(){

world.innerHTML=`
<div id="crossV"></div>
<div id="crossH"></div>
`

enemies=[]
trails=[]

gameOver=false
paused=false
gameTime=0

gameoverText.style.display="none"

createPlayer()
}

function createPlayer(){

player=document.createElement("div")
player.className="player"

world.appendChild(player)

playerX=window.innerWidth/2
playerY=window.innerHeight/2
}

function spawnEnemy(){

if(gameOver||paused) return

const enemy=document.createElement("div")
enemy.className="enemy"

const sizeScale=0.5+Math.random()*1.5
const size=30*sizeScale

enemy.style.width=size+"px"
enemy.style.height=size+"px"
enemy.size=size

const margin=60
const side=Math.floor(Math.random()*4)

if(side===0){
enemy.x=Math.random()*window.innerWidth
enemy.y=-margin
}
else if(side===1){
enemy.x=Math.random()*window.innerWidth
enemy.y=window.innerHeight+margin
}
else if(side===2){
enemy.x=-margin
enemy.y=Math.random()*window.innerHeight
}
else{
enemy.x=window.innerWidth+margin
enemy.y=Math.random()*window.innerHeight
}

const dx=playerX-enemy.x
const dy=playerY-enemy.y
const len=Math.sqrt(dx*dx+dy*dy)||1

enemy.vx=dx/len
enemy.vy=dy/len
enemy.baseSpeed=1.5+Math.random()
enemy.waveOffset=Math.random()*Math.PI*2

world.appendChild(enemy)

enemies.push(enemy)
}

function addTrail(){

const t=document.createElement("div")
t.className="trail"

t.style.left=playerX+"px"
t.style.top=playerY+"px"

t.life=0.2

world.appendChild(t)

trails.push(t)
}

function checkCollision(enemy){

const dx=playerX-enemy.x
const dy=playerY-enemy.y

return Math.sqrt(dx*dx+dy*dy)<enemy.size/2
}

function gameLoop(now){

const delta=(now-lastFrame)/1000
lastFrame=now

if(!paused && !gameOver){

gameTime+=delta

let moveSpeed=300*delta

if(keys["ArrowUp"]) playerY-=moveSpeed
if(keys["ArrowDown"]) playerY+=moveSpeed
if(keys["ArrowLeft"]) playerX-=moveSpeed
if(keys["ArrowRight"]) playerX+=moveSpeed

const half=15

playerX=Math.max(half,Math.min(window.innerWidth-half,playerX))
playerY=Math.max(half,Math.min(window.innerHeight-half,playerY))

player.style.left=playerX+"px"
player.style.top=playerY+"px"

addTrail()

for(let i=trails.length-1;i>=0;i--){

let t=trails[i]

t.life-=delta
t.style.opacity=t.life/0.2

if(t.life<=0){

t.remove()
trails.splice(i,1)

}
}

for(let enemy of enemies){

const wave=Math.sin(gameTime*3+enemy.waveOffset)
const speedMultiplier=1+wave*0.5

enemy.x+=enemy.vx*200*delta*enemy.baseSpeed*speedMultiplier
enemy.y+=enemy.vy*200*delta*enemy.baseSpeed*speedMultiplier

enemy.style.left=enemy.x+"px"
enemy.style.top=enemy.y+"px"

if(checkCollision(enemy)){

gameOver=true

if(gameTime>highScore){

highScore=gameTime
localStorage.setItem("rotateHighScore",highScore)

}

gameoverText.style.display="block"
}
}

ui.textContent=
"Score : "+gameTime.toFixed(1)+
"   High : "+Number(highScore).toFixed(1)

let rotationDuration=8-Math.sqrt(gameTime)*0.2
if(rotationDuration<3) rotationDuration=3

const angle=(gameTime/rotationDuration)*360

world.style.transform=`rotateZ(${angle}deg)`
}

requestAnimationFrame(gameLoop)
}

</script>

</body>
</html>
